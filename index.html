<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Notes Summarizer</title>
  <meta name="description" content="Instantly convert long notes into concise, easy-to-read summaries powered by AI." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Decorative background blobs -->
  <div class="bg-decor" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <!-- ================= NAVBAR ================= -->
  <header class="navbar">
    <div class="navbar-inner">
      <div class="logo">
        <span class="logo-mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L14.2 8.8L21 11L14.2 13.2L12 20L9.8 13.2L3 11L9.8 8.8L12 2Z" fill="url(#logoGrad)"/>
            <defs>
              <linearGradient id="logoGrad" x1="3" y1="2" x2="21" y2="20" gradientUnits="userSpaceOnUse">
                <stop stop-color="#4F46E5"/>
                <stop offset="1" stop-color="#7C3AED"/>
              </linearGradient>
            </defs>
          </svg>
        </span>
        <span class="logo-text">AI Notes Summarizer</span>
      </div>
    </div>
  </header>

  <main>
    <!-- ================= HERO ================= -->
    <section class="hero">
      <h1 class="hero-title">AI Notes Summarizer</h1>
      <p class="hero-subtitle">Instantly convert long notes into concise, easy-to-read summaries powered by AI.</p>
    </section>

    <!-- ================= MAIN CARD ================= -->
    <section class="card main-card" aria-labelledby="input-heading">
      <h2 id="input-heading" class="visually-hidden">Enter your notes</h2>

      <div class="textarea-wrap">
        <label for="notesInput" class="visually-hidden">Paste your notes here</label>
        <textarea
          id="notesInput"
          class="notes-textarea"
          placeholder="Paste your notes here..."
          aria-describedby="charCounter"
          rows="8"
        ></textarea>
        <div id="charCounter" class="char-counter" aria-live="polite">0 characters</div>
      </div>

      <div class="options-row">
        <div class="select-field">
          <label for="summaryType">Summary Type</label>
          <select id="summaryType">
            <option value="Short Summary">Short Summary</option>
            <option value="Detailed Summary">Detailed Summary</option>
            <option value="Bullet Points">Bullet Points</option>
            <option value="Key Takeaways">Key Takeaways</option>
          </select>
        </div>

        <div class="select-field">
          <label for="summaryLength">Summary Length</label>
          <select id="summaryLength">
            <option value="Very Short">Very Short</option>
            <option value="Medium" selected>Medium</option>
            <option value="Long">Long</option>
          </select>
        </div>
      </div>

      <div class="actions-row">
        <button id="summarizeBtn" class="btn btn-primary" type="button">
          <span class="btn-label">Summarize Notes</span>
          <span class="spinner" id="btnSpinner" aria-hidden="true"></span>
        </button>
        <button id="clearBtn" class="btn btn-ghost" type="button">Clear</button>
      </div>

      <p class="hint">Tip: Press <kbd>Ctrl</kbd> + <kbd>Enter</kbd> to summarize</p>
    </section>

    <!-- ================= RESULT SECTION ================= -->
    <section class="card result-card" id="resultSection" aria-labelledby="result-heading" hidden>
      <h2 id="result-heading" class="result-title">Your Summary</h2>
      <div id="summaryOutput" class="summary-output" aria-live="polite"></div>
      <div class="result-actions">
        <button id="copyBtn" class="btn btn-secondary" type="button">Copy Summary</button>
        <button id="downloadBtn" class="btn btn-secondary" type="button">Download as TXT</button>
      </div>
    </section>
  </main>

  <!-- ================= TOAST NOTIFICATIONS ================= -->
  <div id="toastContainer" class="toast-container" aria-live="assertive"></div>

  <footer class="footer">
    <p>Built with vanilla JS &amp; the Groq API.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
